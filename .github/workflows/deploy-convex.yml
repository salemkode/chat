name: Deploy Convex Schema to Production

on:
  push:
    branches:
      - master
    paths:
      - 'convex/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Convex functions to production
        run: npx convex deploy --yes
        env:
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT_URL }}
          CONVEX_ADMIN_KEY: ${{ secrets.CONVEX_ADMIN_KEY }}
